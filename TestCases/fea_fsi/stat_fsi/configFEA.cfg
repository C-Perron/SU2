%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
% SU2 configuration file                                                       %
% Case description: Aero-thermo-elasticity                                     %
%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%

% Nonlinear thermoelasticity
SOLVER= ELASTICITY
GEOMETRIC_CONDITIONS= LARGE_DEFORMATIONS
MATERIAL_MODEL= NEO_HOOKEAN
MATERIAL_COMPRESSIBILITY= COMPRESSIBLE
FORMULATION_ELASTICITY_2D= PLANE_STRAIN
WEAKLY_COUPLED_HEAT_EQUATION= YES
INC_NONDIM= DIMENSIONAL

% Material properties
ELASTICITY_MODULUS= 21000
MATERIAL_DENSITY= 0.8
POISSON_RATIO= 0.4

SPECIFIC_HEAT_CP= 1
THERMAL_CONDUCTIVITY_CONSTANT= 4
MATERIAL_REFERENCE_TEMPERATURE= 0.1
MATERIAL_THERMAL_EXPANSION_COEFF= 1

% Boundary conditions
MARKER_CLAMPED= ( clamped )
MARKER_FLUID_LOAD= ( wallS )
MARKER_CHT_INTERFACE= ( wallS )
MARKER_CREATE_COPY= ( clamped, isothermal )
MARKER_ISOTHERMAL= ( isothermal, 0.1 )

MARKER_PLOTTING= ( wallS )
MARKER_MONITORING= ( wallS )

% Initial conditions
FREESTREAM_TEMPERATURE= 0.1

% Solver settings
NUM_METHOD_GRAD= GREEN_GAUSS

TIME_DISCRE_HEAT= EULER_IMPLICIT
CFL_NUMBER= 1e8
LINEAR_SOLVER= CONJUGATE_GRADIENT
LINEAR_SOLVER_PREC= ILU
LINEAR_SOLVER_ERROR= 1e-4
LINEAR_SOLVER_ITER= 500

% Convergence settings
INNER_ITER= 5
CONV_FIELD= RMS_UTOL
CONV_RESIDUAL_MINVAL= -10

% In/Out
SCREEN_OUTPUT= INNER_ITER, RMS_RES, VMS, TOTAL_HEATFLUX, LINSOL

MESH_FORMAT= SU2
MESH_FILENAME= meshFEA.su2
TABULAR_FORMAT= CSV

VOLUME_FILENAME= result_beam
SOLUTION_FILENAME= solution_beam
RESTART_FILENAME= restart_beam

