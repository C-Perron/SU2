%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
% SU2 configuration file                                                       %
% Case description: Aero-thermo-elasticity                                     %
%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%

% Laminar flow
SOLVER= NAVIER_STOKES
KIND_TURB_MODEL= NONE

% Material properties
FLUID_MODEL= STANDARD_AIR
VISCOSITY_MODEL= CONSTANT_VISCOSITY
MU_CONSTANT= 1.82E-4
CONDUCTIVITY_MODEL= CONSTANT_PRANDTL
PRANDTL_LAM= 0.72

% Boundary conditions
MARKER_INLET= ( inlet, 0.0578070909, 20.1346756866, 1.0, 0.0, 0.0 )
MARKER_OUTLET= ( outlet, 19.5809057203 )
MARKER_EULER= ( upper, lower )
MARKER_CHT_INTERFACE= ( wallF )

MARKER_PLOTTING= ( wallF )
MARKER_MONITORING= ( wallF )

% Initial conditions
MACH_NUMBER= 0.03
INIT_OPTION= TD_CONDITIONS
FREESTREAM_OPTION= TEMPERATURE_FS
FREESTREAM_PRESSURE= 19.5809057203
FREESTREAM_TEMPERATURE= 0.0578070909

% Mesh deformation
DEFORM_MESH= YES
MARKER_DEFORM_MESH= ( wallF )
MARKER_DEFORM_MESH_SYM_PLANE= ( upper )
DEFORM_NONLINEAR_ITER= 1
DEFORM_STIFFNESS_TYPE= INVERSE_VOLUME
DEFORM_LINEAR_SOLVER= CONJUGATE_GRADIENT
DEFORM_LINEAR_SOLVER_PREC= ILU
DEFORM_LINEAR_SOLVER_ITER= 500
DEFORM_LINEAR_SOLVER_ERROR= 1E-8
DEFORM_CONSOLE_OUTPUT= NO

% Solver settings
CONV_NUM_METHOD_FLOW= ROE
MUSCL_FLOW= YES
NUM_METHOD_GRAD= WEIGHTED_LEAST_SQUARES
SLOPE_LIMITER_FLOW= VENKATAKRISHNAN
VENKAT_LIMITER_COEFF= 1.0

TIME_DISCRE_FLOW= EULER_IMPLICIT
CFL_NUMBER= 500
LINEAR_SOLVER= FGMRES
LINEAR_SOLVER_PREC= ILU
LINEAR_SOLVER_ERROR= 0.1
LINEAR_SOLVER_ITER= 10

% Convergence settings
INNER_ITER= 100
CONV_FIELD= RMS_DENSITY
CONV_RESIDUAL_MINVAL= -9

% Reference values
REF_ORIGIN_MOMENT_X= 0.0
REF_ORIGIN_MOMENT_Y= 0.0
REF_ORIGIN_MOMENT_Z= 0.0
REF_AREA= 0.016
REYNOLDS_LENGTH= 0.016

% In/Out
SCREEN_OUTPUT= INNER_ITER, RMS_RES, TOTAL_HEATFLUX, LINSOL

MESH_FORMAT= SU2
MESH_FILENAME= meshFlow.su2
TABULAR_FORMAT= CSV

VOLUME_FILENAME= result_flow
SOLUTION_FILENAME= solution_flow
RESTART_FILENAME= restart_flow

